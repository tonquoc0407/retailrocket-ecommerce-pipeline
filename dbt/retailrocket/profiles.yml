# kept in-project so the same creds drive dbt and the rest of the stack.
# run dbt with: dbt run --profiles-dir dbt/retailrocket
retailrocket:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'retail') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'retail') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'retailrocket') }}"
      schema: gold
      threads: 4
