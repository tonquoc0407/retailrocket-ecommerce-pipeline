# Full local stack: Postgres, Airflow (webserver + scheduler), FastAPI,
# Prometheus, Grafana, and a statsd-exporter for Airflow metrics.
# Single host — this is both the dev and the deployment target.

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow.Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-retail}:${POSTGRES_PASSWORD:-retail}@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-retailrocket-dev}
    AIRFLOW__METRICS__STATSD_ON: "True"
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: "9125"
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
    # the DAG's BashOperator tasks run against these
    PROJECT_HOME: /opt/project
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ${POSTGRES_DB:-retailrocket}
    POSTGRES_USER: ${POSTGRES_USER:-retail}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail}
    GOLD_SCHEMA: gold
    ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./:/opt/project
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retailrocket}
      POSTGRES_USER: ${POSTGRES_USER:-retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail}"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create --username admin --password admin
        --firstname admin --lastname admin --role Admin --email admin@example.com
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-retailrocket}
      POSTGRES_USER: ${POSTGRES_USER:-retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail}
      GOLD_SCHEMA: gold
    ports:
      - "8000:8000"
    volumes:
      # trained models land here (written by the DAG via the shared repo mount)
      - ./ml/model_registry:/app/ml/model_registry
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  statsd-exporter:
    image: prom/statsd-exporter:v0.26.1
    command:
      - --statsd.mapping-config=/tmp/mapping.yml
      - --statsd.listen-udp=:9125
      - --web.listen-address=:9102
    volumes:
      - ./monitoring/statsd_mapping.yml:/tmp/mapping.yml:ro
    ports:
      - "9102:9102"

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
