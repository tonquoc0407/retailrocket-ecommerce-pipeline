global:
  scrape_interval: 15s

scrape_configs:
  # FastAPI request metrics via prometheus-fastapi-instrumentator
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Airflow metrics: Airflow emits statsd, statsd-exporter turns it into Prometheus
  - job_name: airflow
    static_configs:
      - targets: ["statsd-exporter:9102"]
