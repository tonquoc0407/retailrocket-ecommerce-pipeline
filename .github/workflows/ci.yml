name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.15.20
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -q

  dbt:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: retail
          POSTGRES_PASSWORD: retail
          POSTGRES_DB: retailrocket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
      POSTGRES_DB: retailrocket
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # dbt-core must be pinned too: dbt-postgres 1.8.2 has no upper bound on it, so
      # pip otherwise resolves the 2.0 prerelease (dbt Fusion), which dropped postgres.
      - run: pip install dbt-core==1.8.9 dbt-postgres==1.8.2
      # compile validates that every model (incremental logic included) parses and
      # its refs resolve against the adapter, without needing the raw data loaded.
      - run: dbt compile --profiles-dir dbt/retailrocket --project-dir dbt/retailrocket
